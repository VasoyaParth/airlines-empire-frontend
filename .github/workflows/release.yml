name: Build & Release APK

# Same pattern as the Truck Manager sibling app: runs automatically on every
# push to main, and can also be triggered manually from the Actions tab for
# any branch (pick it in the "Run workflow" dropdown).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note added to the release body'
        required: false
        default: 'Manual release'

permissions:
  contents: write   # needed to create tags & releases

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # 1) Get the code + full history so we can read existing tags
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Work out the next version by bumping the latest vX.Y.Z tag's patch
      - name: Compute next version
        id: ver
        run: |
          # Source of truth = android versionName. If a release for that
          # version already exists, fall back to patch-bumping the latest
          # tag so tags never collide.
          gv=$(grep -oE 'versionName "[0-9]+(\.[0-9]+)*"' android/app/build.gradle | head -n1 | grep -oE '[0-9]+(\.[0-9]+)*')
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -n "$gv" ] && ! git rev-parse "v${gv}" >/dev/null 2>&1; then
            next="v${gv}"
          elif [ -z "$latest" ]; then
            next="v1.0.0"
          else
            v=${latest#v}
            IFS='.' read -r MA MI PA <<< "$v"
            MA=${MA:-1}; MI=${MI:-0}; PA=${PA:-0}
            next="v${MA}.${MI}.$((PA + 1))"
          fi
          echo "Gradle versionName: ${gv:-none}  Latest tag: ${latest:-none} -> Next: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"

      # 3) Toolchain: Node + Java 17 + Android SDK
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4) Install JS dependencies (reproducible)
      - name: Install dependencies
        run: npm ci

      # 5) Build the signed release APK (uses the committed debug keystore)
      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # 6) Rename the APK to include the version
      - name: Rename APK
        id: apk
        run: |
          mkdir -p dist
          src="android/app/build/outputs/apk/release/app-release.apk"
          out="dist/AirlinesEmpire-${{ steps.ver.outputs.version }}.apk"
          cp "$src" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"
          ls -la dist

      # 7) Create the GitHub Release (tag it) and attach the APK
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Airlines Empire ${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          body: |
            ${{ github.event_name == 'workflow_dispatch' && format('Manual release from `{0}` — {1}', github.ref_name, inputs.note) || format('Automated release built from `{0}`.', github.ref_name) }} (${{ github.sha }})
            Download **AirlinesEmpire-${{ steps.ver.outputs.version }}.apk** below and install on Android.
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
